<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GRFT+ · Tag designer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Unlisted experiment — keep search engines + social previews away. -->
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<meta name="referrer" content="no-referrer">

<script src="opentype.min.js"></script>

<style>
  @font-face {
    font-family: "GraffitiPlus Display";
    src: url("Fonts/GraffitiPlusDisplay-Regular.woff2?v=3") format("woff2"),
         url("Fonts/GraffitiPlusDisplay-Regular.ttf") format("truetype");
    font-weight: 400;
    font-style: normal;
    font-display: block;
  }
  :root { --bg: #1a1410; --ink: #fafafa; --accent: #ffc800; --sel: #4cc9ff; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 10px;
    padding: 14px;
  }
  header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  header h1 {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 700;
    opacity: 0.7;
    margin: 0 auto 0 0;
  }
  input[type=text], textarea, select {
    background: rgba(255,255,255,0.08);
    color: var(--ink);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 8px 12px;
    font: 700 14px/1.25 "Inter", system-ui, sans-serif;
    outline: none;
    resize: none;
  }
  input[type=text]:focus, textarea:focus, select:focus { outline: 2px solid var(--accent); }
  input[type=text] { min-width: 200px; flex: 1; max-width: 360px; }
  textarea {
    min-width: 200px; flex: 1; max-width: 360px;
    min-height: 36px;
    height: 36px;        /* JS auto-grows up to a max */
    max-height: 120px;
    overflow-y: auto;
    font-family: "Inter", system-ui, sans-serif;
    line-height: 1.25;
  }
  select { min-width: 140px; }
  .pill-group {
    display: inline-flex;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 999px;
    overflow: hidden;
  }
  .pill-group button {
    background: transparent;
    color: var(--ink);
    border: none;
    border-right: 1px solid rgba(255,255,255,0.2);
    padding: 8px 14px;
    cursor: pointer;
    font: 700 11px/1 "Inter", system-ui, sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .pill-group button:last-child { border-right: none; }
  .pill-group button.active { background: var(--accent); color: var(--bg); }
  button.btn, button.go {
    background: rgba(255,255,255,0.08);
    color: var(--ink);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 999px;
    padding: 8px 14px;
    font: 700 11px/1 "Inter", system-ui, sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
  }
  button.btn:hover { background: rgba(255,255,255,0.15); }
  button.btn:disabled { opacity: 0.4; cursor: not-allowed; }
  button.go { background: var(--accent); color: var(--bg); border-color: transparent; padding: 10px 20px; font-size: 12px; font-weight: 800; }
  button.go:hover { background: #fff; }

  /* Selection toolbar — floats over the top of the stage (absolute), so
     showing/hiding it never reflows the layout. Translucent backdrop keeps
     it readable over the brick wall. */
  .sel-toolbar {
    position: absolute;
    top: 12px;
    left: 50%;
    z-index: 10;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(15, 18, 24, 0.78);
    backdrop-filter: blur(10px) saturate(140%);
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    border: 1px solid rgba(76, 201, 255, 0.45);
    border-radius: 999px;
    padding: 6px 12px;
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, -6px);
    transition: opacity 0.18s ease, transform 0.18s ease;
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
  }
  .sel-toolbar.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translate(-50%, 0);
  }
  .sel-toolbar .label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.75;
    margin-right: 4px;
  }
  .sel-toolbar button {
    background: rgba(255,255,255,0.08);
    color: var(--ink);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    width: 30px; height: 30px;
    cursor: pointer;
    font: 800 14px/1 "Inter", system-ui, sans-serif;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .sel-toolbar button:hover { background: rgba(255,255,255,0.18); }
  .sel-toolbar .danger { color: #ff7373; border-color: rgba(255,115,115,0.3); }

  .stage {
    position: relative;
    background-color: #2a1b14;
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='120'><defs><linearGradient id='v' x1='0' y1='0' x2='0' y2='1'><stop offset='0' stop-color='%23ffffff' stop-opacity='0.18'/><stop offset='0.35' stop-color='%23ffffff' stop-opacity='0'/><stop offset='0.7' stop-color='%23000000' stop-opacity='0'/><stop offset='1' stop-color='%23000000' stop-opacity='0.4'/></linearGradient><linearGradient id='h' x1='0' y1='0' x2='1' y2='0'><stop offset='0' stop-color='%23ffffff' stop-opacity='0.12'/><stop offset='0.2' stop-color='%23ffffff' stop-opacity='0'/><stop offset='0.8' stop-color='%23000000' stop-opacity='0'/><stop offset='1' stop-color='%23000000' stop-opacity='0.28'/></linearGradient></defs><rect width='240' height='120' fill='%23170a05'/><g><rect x='3' y='3' width='112' height='52' fill='%239c4a2f'/><rect x='119' y='3' width='118' height='52' fill='%23b35836'/><rect x='-55' y='63' width='112' height='54' fill='%23a64f30'/><rect x='61' y='63' width='112' height='54' fill='%2394462a'/><rect x='177' y='63' width='118' height='54' fill='%23aa5232'/></g><g><rect x='3' y='3' width='112' height='52' fill='url(%23v)'/><rect x='119' y='3' width='118' height='52' fill='url(%23v)'/><rect x='-55' y='63' width='112' height='54' fill='url(%23v)'/><rect x='61' y='63' width='112' height='54' fill='url(%23v)'/><rect x='177' y='63' width='118' height='54' fill='url(%23v)'/></g><g><rect x='3' y='3' width='112' height='52' fill='url(%23h)'/><rect x='119' y='3' width='118' height='52' fill='url(%23h)'/><rect x='-55' y='63' width='112' height='54' fill='url(%23h)'/><rect x='61' y='63' width='112' height='54' fill='url(%23h)'/><rect x='177' y='63' width='118' height='54' fill='url(%23h)'/></g></svg>");
    background-size: 240px 120px;
    background-repeat: repeat;
    border: 1px solid rgba(0,0,0,0.4);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: inset 0 0 180px rgba(0,0,0,0.65);
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;          /* let us own all pointer events on the stage */
    cursor: default;
  }
  #paint, #overlay, #marquee-svg {
    position: absolute; inset: 0; width: 100%; height: 100%;
  }
  #paint {
    display: block;
    pointer-events: none;       /* canvas under the overlay */
    /* Blend the paint with the brick wall beneath so it picks up the 3D
       shading — recessed mortar darkens the paint, lit brick faces keep
       it bright. hard-light preserves paint color better than multiply. */
    mix-blend-mode: hard-light;
  }
  #overlay { pointer-events: none; }                          /* container; chars opt in */
  #marquee-svg { pointer-events: none; }
  #writer {
    position: absolute;
    pointer-events: none;
    transform-origin: 50% 0;
    transform: translate(-50%, 0);
    will-change: transform, left, top;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,0.6));
    opacity: 0;
    transition: opacity 0.2s;
  }

  /* Per-character draggable element. Sized to the actual glyph INK bbox
     (not the em box) so the hit target + selection outline hug the visible
     letter — no more wrong selections from oversized hitboxes. The inner
     .char-glyph span renders the text, offset so its ink aligns with the
     div bounds (see renderOverlay for the math). */
  .char {
    position: absolute;
    left: 0; top: 0;
    cursor: grab;
    pointer-events: auto;
    user-select: none;
    -webkit-user-select: none;
  }
  .char.selected {
    outline: 2px solid var(--sel);
    outline-offset: 2px;
    border-radius: 4px;
    box-shadow: 0 0 14px rgba(76, 201, 255, 0.55);
  }
  .char.dragging { cursor: grabbing; }
  .char-glyph {
    position: absolute;
    color: var(--accent);
    font-family: "GraffitiPlus Display", system-ui, sans-serif;
    line-height: 1;
    white-space: pre;
    pointer-events: none;        /* clicks hit the parent .char div */
    -webkit-text-stroke: 2px rgba(0,0,0,0.4);
    text-shadow: 0 4px 14px rgba(0,0,0,0.55);
    transition: text-shadow 0.18s;
  }
  .char.selected .char-glyph {
    text-shadow: 0 0 16px rgba(76, 201, 255, 0.6), 0 4px 14px rgba(0,0,0,0.55);
  }

  /* Marquee selection rectangle */
  .marquee {
    fill: rgba(76, 201, 255, 0.12);
    stroke: rgba(76, 201, 255, 0.7);
    stroke-width: 1.5;
    stroke-dasharray: 4 3;
  }

  footer {
    font-size: 11px;
    opacity: 0.55;
    text-align: center;
  }
  footer code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; }
  footer kbd {
    display: inline-block;
    padding: 1px 6px;
    border: 1px solid rgba(255,255,255,0.25);
    border-bottom-width: 2px;
    border-radius: 4px;
    font: 700 10px/1 ui-monospace, Menlo, monospace;
  }

  /* While paint engine is playing OR after Paint It finishes, hide & disable
     the design overlay so the painted canvas is uninterrupted. Click "Edit"
     (or just edit the text) to flip back. */
  body.painting #overlay .char { opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  body.painting #marquee-svg { display: none; }
  body.painting .sel-toolbar { visibility: hidden; }

  /* Animation-path edit layer — shown when the user toggles the Paths
     button. Two bezier curves (entry + exit) plus draggable control-point
     handles. Read-only anchor dots mark the first/last paint points. */
  #paths-svg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    display: none;
    z-index: 9;
    overflow: visible;   /* handles can be off-stage (that's the point) */
  }
  body.paths-on #paths-svg { display: block; }
  body.paths-on #paths-svg .handle {
    pointer-events: auto;
    cursor: grab;
  }
  body.paths-on #paths-svg .handle.dragging { cursor: grabbing; }
  body.paths-on .paint-btn-disabled-paths-mode { opacity: 0.5; }
  #paths-btn.active { background: var(--sel); color: var(--bg); border-color: transparent; }
  .paths-ctrl { display: none !important; }
  body.paths-on .paths-ctrl { display: inline-flex !important; }
  /* Show the Edit button only while painted; hide it during design. */
  #edit-btn { display: none; }
  body.painting #edit-btn { display: inline-flex; }

  /* Transparent-preview mode — judge the tag exactly as it exports/embeds:
     raw paint (no brick blend) on a checkerboard so transparency is obvious. */
  body.bg-transparent .stage {
    background-color: #2b2b2b;
    background-image:
      linear-gradient(45deg, #3a3a3a 25%, transparent 25%),
      linear-gradient(-45deg, #3a3a3a 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #3a3a3a 75%),
      linear-gradient(-45deg, transparent 75%, #3a3a3a 75%);
    background-size: 24px 24px;
    background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    box-shadow: none;
  }
  body.bg-transparent #paint { mix-blend-mode: normal; }
  #bg-btn.active, #drips-btn.active { background: var(--sel); color: var(--bg); border-color: transparent; }

  /* Drip physics panel — a floating column of sliders for the active brush. */
  #drip-panel {
    position: fixed; top: 64px; right: 16px; z-index: 50;
    width: 270px; max-height: calc(100vh - 96px); overflow-y: auto;
    background: rgba(20,15,11,0.96); border: 1px solid rgba(255,255,255,0.18);
    border-radius: 12px; padding: 14px 16px; display: none;
    box-shadow: 0 18px 50px rgba(0,0,0,0.55); backdrop-filter: blur(6px);
  }
  body.drips-on #drip-panel { display: block; }
  #drip-panel h3 {
    margin: 0 0 4px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    opacity: 0.7; font-weight: 700; display: flex; align-items: center; justify-content: space-between;
  }
  #drip-panel .drip-cap { font-size: 10px; opacity: 0.6; }
  #drip-panel .drip-hint { font-size: 11px; opacity: 0.5; line-height: 1.4; margin: 0 0 10px; }
  .drip-row { display: grid; grid-template-columns: 1fr auto; gap: 2px 8px; align-items: center; margin: 7px 0; }
  .drip-row label { font-size: 11px; opacity: 0.85; }
  .drip-row .drip-val { font: 700 10px/1 ui-monospace, Menlo, monospace; opacity: 0.7; text-align: right; }
  .drip-row input[type=range] { grid-column: 1 / -1; width: 100%; accent-color: var(--sel); }
  #drip-panel .drip-actions { display: flex; gap: 8px; margin-top: 12px; }
  #drip-panel .drip-actions .btn { flex: 1; justify-content: center; font-size: 11px; }
  #drip-panel.disabled-cap .drip-row:not(.drip-enable) { opacity: 0.35; pointer-events: none; }
</style>
</head>
<body>

<header>
  <h1><a href="lab.html" style="color:inherit;text-decoration:none;opacity:0.55;font-weight:400;" title="Back to Lab">←&nbsp;Lab&nbsp;·&nbsp;</a>Tag designer</h1>
  <textarea id="text" rows="1" maxlength="60" autocomplete="off" spellcheck="false" placeholder="type your tag… ⏎ for new line">grft+</textarea>
  <div class="pill-group">
    <button id="b-spray" class="active">Spray</button>
    <button id="b-chisel">Chisel</button>
    <button id="b-mop">Mop</button>
  </div>
  <label style="display:inline-flex;align-items:center;gap:6px;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;opacity:0.85;">
    Speed
    <input type="range" id="speed" min="1" max="15" step="0.5" value="7" style="width:110px;accent-color:var(--accent);">
    <span id="speed-val" style="font:700 11px/1 ui-monospace,Menlo,monospace;width:30px;text-align:right;">7×</span>
  </label>
  <button class="btn" id="reset">↺ Reset</button>
  <select id="saved-tags" title="Load a saved arrangement">
    <option value="">— Saved tags —</option>
  </select>
  <button class="btn" id="save">💾 Save</button>
  <button class="btn" id="delete-saved" title="Delete loaded tag">🗑</button>
  <button class="btn" id="export-json" title="Save this tag for the website — downloads the JSON (drop it in images/tags/) and copies it to the clipboard. Captures your speed + drip settings so the page replays exactly this.">📤 Export for web</button>
  <button class="btn" id="export-png" title="Render & download a transparent PNG of this tag (static, no animation)">🖼 PNG</button>
  <button class="btn" id="edit-btn">✏ Edit</button>
  <button class="btn" id="bg-btn" title="Preview on transparency — see the tag exactly as it exports (raw paint, no brick blend)">▦ BG</button>
  <button class="btn" id="drips-btn" title="Open the drip physics panel">💧 Drips</button>
  <button class="btn" id="paths-btn" title="Show animation entry/exit paths (drag handles to tune)">🪄 Paths</button>
  <!-- Controls visible only while Paths mode is on. -->
  <label class="paths-ctrl" style="display:inline-flex;align-items:center;gap:6px;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;opacity:0.85;">
    Size
    <input type="range" id="size-slider" min="50" max="250" step="5" value="140" style="width:90px;accent-color:var(--sel);">
    <span id="size-val" style="font:700 11px/1 ui-monospace,Menlo,monospace;width:32px;text-align:right;">1.4×</span>
  </label>
  <button class="btn paths-ctrl" id="copy-config" title="Copy current paths + size to clipboard">📋 Copy</button>
  <button class="btn paths-ctrl" id="reset-paths" title="Restore engine defaults">↺ Reset</button>
  <button class="go" id="play">▶ Paint it</button>
</header>

<!-- Drip physics panel. Rows are generated by JS from DRIP_KNOBS; edits apply
     to the ACTIVE brush live and persist to localStorage. Captured on export. -->
<div id="drip-panel">
  <h3><span>Drip physics</span><span class="drip-cap" id="drip-cap-name">spray</span></h3>
  <p class="drip-hint">Tunes the active brush. Changes preview on the next paint. Saved with the tag on export.</p>
  <div id="drip-rows"></div>
  <div class="drip-actions">
    <button class="btn" id="drip-replay" title="Repaint with current settings">▶ Preview</button>
    <button class="btn" id="drip-reset" title="Restore this brush's default drips">↺ Reset</button>
  </div>
</div>

<div class="stage" id="stage">
  <div id="sel-toolbar" class="sel-toolbar">
    <span class="label" id="sel-count">0 selected</span>
    <button title="Rotate left 5°"  data-act="rot-l">⟲</button>
    <button title="Rotate right 5°" data-act="rot-r">⟳</button>
    <button title="Bigger"          data-act="up">＋</button>
    <button title="Smaller"         data-act="down">−</button>
    <button title="Bring to front"  data-act="front">⤴</button>
    <button title="Send to back"    data-act="back">⤵</button>
    <button class="danger" title="Delete" data-act="del">✕</button>
  </div>
  <canvas id="paint"></canvas>
  <div id="overlay"></div>
  <svg id="marquee-svg"><rect id="marquee" class="marquee" style="display:none"></rect></svg>
  <svg id="paths-svg"></svg>
  <img id="writer" alt="">
</div>

<footer id="status">
  Click a letter to select · <kbd>Shift</kbd>+click to multi-select · drag empty space to box-select · drag a letter to move ·
  arrows or toolbar to rotate / scale
</footer>

<script src="paint-engine.js"></script>
<script>
//
// ── Tag designer ─────────────────────────────────────────────────────────────
//
// State shape:
//   layout: [{ char, x, y, scale, rotation }]  — same as engine.playLayout input
//   selected: Set<index> of layout
//   fontSize: number — the base font size used to seed auto-layout
//   The stage uses canvas pixel coords throughout. We keep one source of
//   truth (`state.layout`) and re-render the DOM overlay from it.
//

const stage    = document.getElementById('stage');
const overlay  = document.getElementById('overlay');
const writer   = document.getElementById('writer');
const canvas   = document.getElementById('paint');
const textInput= document.getElementById('text');
const status   = document.getElementById('status');
const selToolbar = document.getElementById('sel-toolbar');
const selCount   = document.getElementById('sel-count');
const marqueeRect= document.getElementById('marquee');
const savedSel   = document.getElementById('saved-tags');

const state = {
  layout: [],
  selected: new Set(),
  fontSize: 480,
  currentName: null,   // name of the currently-loaded saved tag (if any)
};

// LocalStorage key prefix; "grft-tags" holds the index, individual tags
// live at "grft-tag/<name>".
const STORAGE_INDEX = 'grft-tag-index';
const STORAGE_TAG   = (name) => 'grft-tag/' + name;

// ── Engine init ──────────────────────────────────────────────────────────────
GraffitiPaint.init({
  canvas,
  writer,
  color: '#ffc800',
  // Air-travel between strokes locked at 1/3 of paint speed (the rhythm
  // Alex confirmed feels natural).
  speed:       () => +document.getElementById('speed').value,
  travelSpeed: () => +document.getElementById('speed').value / 3,
  writerConfig: {
    spray:  { img: 'images/grft_can.png', brushSize: 50, imgHeight: 220 },
    chisel: { brushSize: 34, imgHeight: 180 },
    mop:    { brushSize: 26, imgHeight: 180 },
  },
  // Calmer spray drips than the engine default (fewer + shorter) as a starting
  // point for the web — the drip panel lets you tune from here.
  dripConfig: {
    spray: {
      spawnRate: 0.009, spawnThreshold: 0.95, maxRateMultiplier: 2,
      initialVelocity: 5, gravity: 200, initialWetness: 0.85, wetnessDrain: 0.05,
    },
  },
  fontSizeRef: 480,
  maxHeightPx: 240,
});

function setCap(name) {
  GraffitiPaint.setCap(name);
  document.getElementById('b-spray').classList.toggle('active',  name === 'spray');
  document.getElementById('b-chisel').classList.toggle('active', name === 'chisel');
  document.getElementById('b-mop').classList.toggle('active', name === 'mop');
  if (typeof refreshDripPanel === 'function') refreshDripPanel();
}

// ── Layout rendering ─────────────────────────────────────────────────────────
// Each char becomes a div sized to its TRUE INK BBOX (from opentype) — the
// hit target hugs the visible letter, not the em box. An inner <span>
// renders the actual glyph text, positioned via negative top/left offsets so
// the ink lands exactly inside the div's bounds. The engine's (item.x, item.y)
// is the GLYPH BASELINE ANCHOR in canvas coords, so:
//   div top-left = (item.x + obb.x1,  item.y + obb.y1)
//   glyph baseline inside div = at y = -obb.y1 (because obb.y1 is negative)
//   span top = -obb.y1 - (font.ascender * fontSize)  — pulls the glyph's
//              typographic baseline up to land at the right inner-y.

function renderOverlay() {
  overlay.innerHTML = '';
  const font = GraffitiPaint._internal.getFont();
  if (!font) return;
  // Typographic ascender as a fraction of em (for inner-span vertical alignment).
  const ascenderFrac = (font.ascender || font.tables?.os2?.sTypoAscender || 0)
                       / font.unitsPerEm;
  state.layout.forEach((item, i) => {
    const ch = item.char;
    if (ch === ' ') return;            // spaces have no element
    const scale = item.scale || 1;
    const charFontSize = state.fontSize * scale;

    // True ink bbox in glyph-local coords (baseline at y=0).
    const glyph = font.charToGlyph(ch);
    const otPath = glyph.getPath(0, 0, charFontSize);
    const obb = otPath.getBoundingBox();
    if (!obb || !isFinite(obb.x1)) return;
    const inkW = Math.max(1, obb.x2 - obb.x1);
    const inkH = Math.max(1, obb.y2 - obb.y1);

    const el = document.createElement('div');
    el.className = 'char';
    el.dataset.idx = i;
    el.style.width  = inkW + 'px';
    el.style.height = inkH + 'px';
    // Div top-left lands on the ink-top-left in canvas coords.
    const left = item.x + obb.x1;
    const top  = item.y + obb.y1;
    el.style.transformOrigin = `${inkW / 2}px ${inkH / 2}px`;
    el.style.transform = `translate(${left}px, ${top}px) rotate(${item.rotation || 0}deg)`;

    // Inner glyph — sized to fontSize, positioned so its ink lands inside the
    // div bounds. Horizontal: nudge by -obb.x1 to align ink-left with div-left.
    // Vertical: typographic baseline in a line-height:1 span sits at
    // (ascenderFrac * fontSize) below the span's top edge → we want the
    // baseline at (-obb.y1) below the div's top, so span_top = -obb.y1 -
    // ascenderFrac * fontSize (usually negative — the span extends above
    // the div, but the rendered ink stays inside).
    const span = document.createElement('span');
    span.className = 'char-glyph';
    span.textContent = ch;
    span.style.fontSize = charFontSize + 'px';
    span.style.left = (-obb.x1) + 'px';
    span.style.top  = (-obb.y1 - ascenderFrac * charFontSize) + 'px';
    el.appendChild(span);

    if (state.selected.has(i)) el.classList.add('selected');
    overlay.appendChild(el);
  });
  updateSelToolbar();
}

function updateSelToolbar() {
  const n = state.selected.size;
  if (n === 0) {
    selToolbar.classList.remove('visible');
  } else {
    selToolbar.classList.add('visible');
    selCount.textContent = n + (n === 1 ? ' selected' : ' selected');
  }
}

// ── Auto-layout from text input ──────────────────────────────────────────────
function applyAutoLayout(text) {
  const { layout, fontSize } = GraffitiPaint.computeAutoLayout(text);
  state.layout = layout;
  state.fontSize = fontSize;
  state.selected.clear();
  state.currentName = null;
  renderOverlay();
}

function ensureAssetsThen(fn) {
  // Asset loading retry harness: don't render the overlay until font + traces
  // resolved (overlay measurements depend on font).
  const try1 = () => {
    if (GraffitiPaint._internal.getFont() && GraffitiPaint._internal.getTraces()) fn();
    else setTimeout(try1, 80);
  };
  try1();
}

// ── Selection + drag ─────────────────────────────────────────────────────────
let dragSession = null;
// dragSession: { mode: 'move'|'marquee', startCanvas: {x,y}, snapshot, marqueeStart }

function canvasCoords(e) {
  const r = stage.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function indicesInRect(rect) {
  // rect: { x, y, w, h } in canvas coords.  Hit-test against each char's
  // baseline anchor (simple + fast; collides with the visible ink reasonably).
  const out = [];
  state.layout.forEach((item, i) => {
    if (item.char === ' ') return;
    if (item.x >= rect.x && item.x <= rect.x + rect.w &&
        item.y >= rect.y && item.y <= rect.y + rect.h) {
      out.push(i);
    }
  });
  return out;
}

// ── Undo stack ───────────────────────────────────────────────────────────────
// Pushed BEFORE any layout-mutating action (drag completed with movement,
// toolbar rotate/scale/front/back/delete, keyboard equivalents). Ctrl/Cmd+Z
// pops the top snapshot and restores it. Selection is not part of undo state
// — it's a transient UI thing that just resets to empty on undo.
const undoStack = [];
const MAX_UNDO = 50;
function snapshotLayout() {
  return JSON.parse(JSON.stringify(state.layout));
}
function pushUndo() {
  undoStack.push(snapshotLayout());
  if (undoStack.length > MAX_UNDO) undoStack.shift();
}
function undo() {
  if (undoStack.length === 0) return;
  state.layout = undoStack.pop();
  state.selected.clear();
  renderOverlay();
  status.textContent = 'Undid (' + undoStack.length + ' remaining)';
}

function startDrag(idx, e) {
  if (!state.selected.has(idx)) {
    if (!e.shiftKey) state.selected.clear();
    state.selected.add(idx);
    renderOverlay();
  } else if (e.shiftKey) {
    // shift-click on already-selected = remove from selection (but don't drag)
    state.selected.delete(idx);
    renderOverlay();
    return;
  }
  const start = canvasCoords(e);
  dragSession = {
    mode: 'move',
    startCanvas: start,
    snapshot: new Map([...state.selected].map(i => [i, { x: state.layout[i].x, y: state.layout[i].y }])),
    undoSnapshot: snapshotLayout(),
    moved: false,
  };
  document.body.style.cursor = 'grabbing';
}

function startMarquee(e) {
  if (!e.shiftKey) {
    state.selected.clear();
    renderOverlay();
  }
  const start = canvasCoords(e);
  dragSession = { mode: 'marquee', marqueeStart: start, baseSelection: new Set(state.selected) };
  marqueeRect.style.display = '';
  marqueeRect.setAttribute('x', start.x);
  marqueeRect.setAttribute('y', start.y);
  marqueeRect.setAttribute('width', 0);
  marqueeRect.setAttribute('height', 0);
}

function onPointerMove(e) {
  if (!dragSession) return;
  const cur = canvasCoords(e);
  if (dragSession.mode === 'move') {
    const dx = cur.x - dragSession.startCanvas.x;
    const dy = cur.y - dragSession.startCanvas.y;
    if (Math.abs(dx) > 1 || Math.abs(dy) > 1) dragSession.moved = true;
    for (const [i, base] of dragSession.snapshot) {
      state.layout[i].x = base.x + dx;
      state.layout[i].y = base.y + dy;
    }
    renderOverlay();
  } else if (dragSession.mode === 'marquee') {
    const s = dragSession.marqueeStart;
    const x = Math.min(s.x, cur.x), y = Math.min(s.y, cur.y);
    const w = Math.abs(cur.x - s.x), h = Math.abs(cur.y - s.y);
    marqueeRect.setAttribute('x', x);
    marqueeRect.setAttribute('y', y);
    marqueeRect.setAttribute('width', w);
    marqueeRect.setAttribute('height', h);
    const hit = indicesInRect({ x, y, w, h });
    state.selected = new Set([...dragSession.baseSelection, ...hit]);
    renderOverlay();
  }
}

function onPointerUp() {
  if (!dragSession) return;
  if (dragSession.mode === 'move' && dragSession.moved) {
    // Commit the pre-drag snapshot to the undo stack ONLY if the drag
    // actually moved something — a pure click shouldn't pollute history.
    undoStack.push(dragSession.undoSnapshot);
    if (undoStack.length > MAX_UNDO) undoStack.shift();
  }
  if (dragSession.mode === 'marquee') {
    marqueeRect.style.display = 'none';
  }
  dragSession = null;
  document.body.style.cursor = '';
}

stage.addEventListener('pointerdown', e => {
  // While painted, the stage is a "view" — ignore pointer input so the user
  // can admire the result without accidentally marquee-selecting.
  if (document.body.classList.contains('painting')) return;
  // The floating selection toolbar lives INSIDE the stage now — clicks on
  // it should go to the toolbar handler, not start a marquee.
  if (e.target.closest('.sel-toolbar')) return;
  if (e.target.classList && e.target.classList.contains('char')) {
    const idx = +e.target.dataset.idx;
    startDrag(idx, e);
  } else {
    startMarquee(e);
  }
  e.preventDefault();
});
window.addEventListener('pointermove', onPointerMove);
window.addEventListener('pointerup',   onPointerUp);
window.addEventListener('pointercancel', onPointerUp);

// ── Selection actions (rotate / scale / front / back / delete) ───────────────
function actOnSelection(act) {
  if (state.selected.size === 0) return;
  pushUndo();                          // snapshot BEFORE every mutation
  if (act === 'del') {
    // Remove in reverse so indices remain valid.
    const sortedDesc = [...state.selected].sort((a, b) => b - a);
    for (const i of sortedDesc) state.layout.splice(i, 1);
    state.selected.clear();
  } else if (act === 'front' || act === 'back') {
    // Reorder: pluck selected chars out, re-insert at front or back of array.
    // Front = drawn LAST in overlay (highest stacking via DOM order) AND
    // painted last by the engine. Back = drawn first.
    const sortedDesc = [...state.selected].sort((a, b) => b - a);
    const plucked = sortedDesc.map(i => state.layout.splice(i, 1)[0]).reverse();
    if (act === 'front') state.layout = state.layout.concat(plucked);
    else                 state.layout = plucked.concat(state.layout);
    // Rebuild selection indices to match new positions.
    state.selected.clear();
    if (act === 'front') {
      for (let i = state.layout.length - plucked.length; i < state.layout.length; i++) state.selected.add(i);
    } else {
      for (let i = 0; i < plucked.length; i++) state.selected.add(i);
    }
  } else {
    const delta = { 'rot-l': -5, 'rot-r': +5 }[act];
    const factor = { 'up': 1.1, 'down': 1 / 1.1 }[act];
    for (const i of state.selected) {
      if (delta != null) state.layout[i].rotation = (state.layout[i].rotation || 0) + delta;
      if (factor != null) state.layout[i].scale    = Math.max(0.15, Math.min(6, (state.layout[i].scale || 1) * factor));
    }
  }
  renderOverlay();
}
selToolbar.addEventListener('click', e => {
  const b = e.target.closest('button[data-act]');
  if (b) actOnSelection(b.dataset.act);
});
// Keyboard: Ctrl/Cmd+Z = undo (works everywhere except text inputs); arrow
// keys rotate ±5°; +/− scale; Delete/Backspace = delete (selection-aware).
window.addEventListener('keydown', e => {
  const inField = e.target.tagName === 'TEXTAREA'
               || e.target.tagName === 'INPUT'
               || e.target.tagName === 'SELECT';
  // Ctrl/Cmd+Z: undo. Skip in text inputs so the browser's native undo
  // handles those edits.
  if ((e.metaKey || e.ctrlKey) && !e.shiftKey && e.key.toLowerCase() === 'z') {
    if (inField) return;
    undo();
    e.preventDefault();
    return;
  }
  if (inField) return;
  if (state.selected.size === 0) return;
  const map = { ArrowLeft: 'rot-l', ArrowRight: 'rot-r',
                '=': 'up', '+': 'up', '-': 'down', '_': 'down',
                Delete: 'del', Backspace: 'del' };
  const act = map[e.key];
  if (act) { actOnSelection(act); e.preventDefault(); }
});

// ── Text input → auto-layout ─────────────────────────────────────────────────
// Auto-grow the textarea height to fit its line count (so multi-line entry
// doesn't force the user to scroll inside the input).
function autosizeTextarea() {
  textInput.style.height = 'auto';
  textInput.style.height = Math.min(120, Math.max(36, textInput.scrollHeight)) + 'px';
}
textInput.addEventListener('input', () => {
  autosizeTextarea();
  // Editing the text snaps us back to design mode if we were painted.
  if (document.body.classList.contains('painting')) returnToDesign();
  ensureAssetsThen(() => applyAutoLayout(textInput.value || ''));
});
autosizeTextarea();

// ── Speed slider ─────────────────────────────────────────────────────────────
const speedEl    = document.getElementById('speed');
const speedValEl = document.getElementById('speed-val');
const getSpeed   = () => +speedEl.value;
speedEl.addEventListener('input', () => {
  speedValEl.textContent = (+speedEl.value).toFixed(1).replace(/\.0$/, '') + '×';
});

// ── Brush toggle ─────────────────────────────────────────────────────────────
function brushClicked(name) {
  setCap(name);
  // If we're showing a painted result, repaint with the new brush so the
  // toggle gives an immediate before/after comparison without an extra tap.
  if (document.body.classList.contains('painting') && state.layout.length) {
    GraffitiPaint.playLayout(state.layout, { fontSize: state.fontSize, speed: getSpeed() });
  }
}
document.getElementById('b-spray').addEventListener('click',  () => brushClicked('spray'));
document.getElementById('b-chisel').addEventListener('click', () => brushClicked('chisel'));
document.getElementById('b-mop').addEventListener('click', () => brushClicked('mop'));

// ── Reset layout ─────────────────────────────────────────────────────────────
document.getElementById('reset').addEventListener('click', () => {
  ensureAssetsThen(() => applyAutoLayout(textInput.value || ''));
});

// ── Paint it (stays painted; Edit returns to design) ───────────────────────
function returnToDesign() {
  document.body.classList.remove('painting');
  GraffitiPaint.clear();
  renderOverlay();
}
document.getElementById('play').addEventListener('click', () => {
  if (!state.layout.length) return;
  document.body.classList.add('painting');
  state.selected.clear();
  renderOverlay();
  // Aborts any in-flight playback before starting fresh (engine's stop +
  // re-arm via abortToken handles this internally).
  GraffitiPaint.playLayout(state.layout, {
    fontSize: state.fontSize,
    speed: getSpeed(),
  });
});
document.getElementById('edit-btn').addEventListener('click', returnToDesign);

// ── Save / Load / Delete ─────────────────────────────────────────────────────
function getIndex() {
  try { return JSON.parse(localStorage.getItem(STORAGE_INDEX) || '[]'); }
  catch { return []; }
}
function setIndex(names) {
  localStorage.setItem(STORAGE_INDEX, JSON.stringify(names));
}
function refreshSavedDropdown() {
  const names = getIndex();
  savedSel.innerHTML = '<option value="">— Saved tags —</option>' +
    names.map(n => `<option value="${n}"${n === state.currentName ? ' selected' : ''}>${n}</option>`).join('');
}
document.getElementById('save').addEventListener('click', () => {
  const suggested = state.currentName || (textInput.value || 'untitled').slice(0, 30);
  const name = prompt('Name this tag:', suggested);
  if (!name) return;
  const payload = {
    text: textInput.value,
    fontSize: state.fontSize,
    cap: GraffitiPaint._internal.getCap(),
    layout: state.layout,
    savedAt: new Date().toISOString(),
  };
  localStorage.setItem(STORAGE_TAG(name), JSON.stringify(payload));
  const names = getIndex();
  if (!names.includes(name)) { names.push(name); setIndex(names); }
  state.currentName = name;
  refreshSavedDropdown();
  status.textContent = `Saved as "${name}" ✓`;
});
savedSel.addEventListener('change', () => {
  const name = savedSel.value;
  if (!name) return;
  const raw = localStorage.getItem(STORAGE_TAG(name));
  if (!raw) { status.textContent = `No saved tag "${name}"`; return; }
  try {
    const payload = JSON.parse(raw);
    textInput.value = payload.text || '';
    state.fontSize  = payload.fontSize || 480;
    state.layout    = payload.layout || [];
    if (payload.cap) setCap(payload.cap);
    state.selected.clear();
    state.currentName = name;
    renderOverlay();
    status.textContent = `Loaded "${name}"`;
  } catch (err) {
    status.textContent = `Load failed: ${err.message}`;
  }
});
document.getElementById('delete-saved').addEventListener('click', () => {
  if (!state.currentName) { status.textContent = 'Nothing to delete — load a saved tag first.'; return; }
  if (!confirm(`Delete tag "${state.currentName}"?`)) return;
  const name = state.currentName;
  localStorage.removeItem(STORAGE_TAG(name));
  setIndex(getIndex().filter(n => n !== name));
  state.currentName = null;
  refreshSavedDropdown();
  status.textContent = `Deleted "${name}"`;
});

// ── Export for the website ───────────────────────────────────────────────────
// Two paths, matching how a tag can live on the site:
//   📤 JSON — the portable tag (text, fontSize, brush, color + the canvas size
//             it was authored at). grft-tag.js replays this LIVE, scaling the
//             layout to whatever element it's dropped into.
//   🖼 PNG  — a transparent raster of the finished paint, for a STATIC <img>.
function slugify(s) {
  return String(s).toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'tag';
}
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
// Tight bounding box of the actual ink (union of glyph outlines), in the same
// CSS-px coord space as the layout. grft-tag.js fits THIS (not the stage, which
// has arbitrary empty margins) into the host element so the letters read large
// and legible at any aspect ratio. Mirrors the engine's per-glyph bbox math.
function computeInkBox() {
  const font = GraffitiPaint._internal.getFont();
  if (!font) return null;
  let x1 = Infinity, y1 = Infinity, x2 = -Infinity, y2 = -Infinity;
  for (const item of state.layout) {
    const ch = item.char;
    if (!ch || ch === ' ') continue;
    const cs = item.scale != null ? item.scale : 1;
    const bb = font.charToGlyph(ch).getPath(item.x, item.y, state.fontSize * cs).getBoundingBox();
    if (!bb || !isFinite(bb.x1)) continue;
    if (bb.x1 < x1) x1 = bb.x1;
    if (bb.y1 < y1) y1 = bb.y1;
    if (bb.x2 > x2) x2 = bb.x2;
    if (bb.y2 > y2) y2 = bb.y2;
  }
  if (!(x2 > x1)) return null;
  return { x: x1, y: y1, w: x2 - x1, h: y2 - y1 };
}
// The portable tag. `stage` is the canvas size (CSS px) the layout coords were
// authored against; `inkBox` is the tight letter bounds. Color is fixed to the
// GRFT+ yellow the engine is initialised with.
function buildTagPayload() {
  const rect = canvas.getBoundingClientRect();
  const cap = GraffitiPaint._internal.getCap();
  return {
    v: 1,
    text: textInput.value,
    fontSize: state.fontSize,
    cap,
    color: '#ffc800',
    speed: getSpeed(),                       // whatever the slider is at, per your call
    drip: GraffitiPaint.getDripConfig(cap),  // full physics for the active brush
    stage: { w: Math.round(rect.width), h: Math.round(rect.height) },
    inkBox: computeInkBox(),
    layout: state.layout,
    savedAt: new Date().toISOString(),
  };
}
document.getElementById('export-json').addEventListener('click', async () => {
  if (!state.layout.length) { status.textContent = 'Nothing to export — design a tag first.'; return; }
  const json = JSON.stringify(buildTagPayload(), null, 2);
  const slug = slugify(state.currentName || textInput.value || 'tag');
  downloadBlob(new Blob([json], { type: 'application/json' }), `grft-tag-${slug}.json`);
  try {
    await navigator.clipboard.writeText(json);
    status.textContent = `Exported "grft-tag-${slug}.json" + copied to clipboard ✓`;
  } catch {
    status.textContent = `Exported "grft-tag-${slug}.json" ✓`;
  }
});
document.getElementById('export-png').addEventListener('click', async () => {
  if (!state.layout.length) { status.textContent = 'Nothing to export — design a tag first.'; return; }
  status.textContent = 'Rendering PNG…';
  // Paint it for real, then snapshot the canvas. The canvas itself is
  // transparent (clearRect, no fill) so the PNG drops onto any background.
  document.body.classList.add('painting');
  state.selected.clear();
  renderOverlay();
  await GraffitiPaint.playLayout(state.layout, { fontSize: state.fontSize, speed: 8 });
  await new Promise(r => setTimeout(r, 500));   // let any drips settle
  canvas.toBlob(blob => {
    if (!blob) { status.textContent = 'PNG export failed.'; return; }
    const slug = slugify(state.currentName || textInput.value || 'tag');
    downloadBlob(blob, `grft-tag-${slug}.png`);
    status.textContent = 'PNG downloaded ✓ — transparent background, ready for an <img>.';
  }, 'image/png');
});

// ── Transparency preview toggle ──────────────────────────────────────────────
// Swaps the brick wall for a checkerboard and drops the canvas blend mode, so
// what you see is the raw paint on transparency — exactly what exports/embeds.
document.getElementById('bg-btn').addEventListener('click', () => {
  const on = document.body.classList.toggle('bg-transparent');
  document.getElementById('bg-btn').classList.toggle('active', on);
  status.textContent = on ? 'Transparent preview — this is the exported look.' : 'Brick-wall preview.';
});

// ── Drip physics panel ───────────────────────────────────────────────────────
// Full per-brush physics. Each knob writes live into the engine via
// setDripConfig and persists to localStorage so tunings survive reloads.
// getDripConfig(cap) at export time bakes the active brush's values into the tag.
const DRIP_KNOBS = [
  { key: 'spawnRate',           label: 'Amount (spawn rate)', min: 0,    max: 0.06, step: 0.001 },
  { key: 'spawnThreshold',      label: 'Overlap needed',      min: 0,    max: 1.5,  step: 0.01  },
  { key: 'maxRateMultiplier',   label: 'Hot-spot multiplier', min: 1,    max: 8,    step: 0.1   },
  { key: 'initialVelocity',     label: 'Start speed',         min: 0,    max: 20,   step: 0.5   },
  { key: 'gravity',             label: 'Gravity',             min: 0,    max: 600,  step: 10    },
  { key: 'drag',                label: 'Air drag',            min: 0.90, max: 1,    step: 0.001 },
  { key: 'initialWetness',      label: 'Ink reservoir',       min: 0.2,  max: 3,    step: 0.05  },
  { key: 'wetnessDrain',        label: 'Dry rate (↑ = shorter)', min: 0.005, max: 0.12, step: 0.001 },
  { key: 'initialThicknessFrac',label: 'Start thickness',     min: 0.1,  max: 1.2,  step: 0.05  },
  { key: 'stampSpacingFrac',    label: 'Stream density',      min: 0.05, max: 0.5,  step: 0.01  },
  { key: 'spreadX',             label: 'Spawn jitter',        min: 0,    max: 20,   step: 1     },
  { key: 'wanderChance',        label: 'Wander chance',       min: 0,    max: 1,    step: 0.05  },
  { key: 'vxMax',               label: 'Drift speed',         min: 0,    max: 15,   step: 0.5   },
  { key: 'swayAmpMax',          label: 'Sway amount',         min: 0,    max: 20,   step: 1     },
];
const DRIP_STORAGE = 'grft-drip-config';
let dripStore = {};
try { dripStore = JSON.parse(localStorage.getItem(DRIP_STORAGE) || '{}'); } catch { dripStore = {}; }

// Push any persisted per-cap overrides into the engine (called once at boot,
// after init so they layer over the engine + designer defaults).
function applyDripStore() {
  for (const cap of Object.keys(dripStore)) GraffitiPaint.setDripConfig(cap, dripStore[cap]);
}

const dripRowsEl = document.getElementById('drip-rows');
// Build the slider rows once; values are filled per-cap in refreshDripPanel.
const dripInputs = {};
DRIP_KNOBS.forEach(k => {
  const row = document.createElement('div');
  row.className = 'drip-row';
  const lab = document.createElement('label'); lab.textContent = k.label;
  const val = document.createElement('span'); val.className = 'drip-val';
  const inp = document.createElement('input');
  inp.type = 'range'; inp.min = k.min; inp.max = k.max; inp.step = k.step;
  inp.addEventListener('input', () => {
    const v = +inp.value;
    val.textContent = fmtDrip(v, k.step);
    const cap = GraffitiPaint._internal.getCap();
    GraffitiPaint.setDripConfig(cap, { [k.key]: v });
    dripStore[cap] = Object.assign({}, dripStore[cap], { [k.key]: v });
    try { localStorage.setItem(DRIP_STORAGE, JSON.stringify(dripStore)); } catch {}
  });
  // On release, preview the change if we're currently showing a painted result.
  inp.addEventListener('change', dripReplay);
  row.appendChild(lab); row.appendChild(val); row.appendChild(inp);
  dripRowsEl.appendChild(row);
  dripInputs[k.key] = { input: inp, val: val };
});
function fmtDrip(v, step) {
  const dec = step < 0.01 ? 3 : step < 1 ? 2 : 0;
  return v.toFixed(dec);
}
function refreshDripPanel() {
  const cap = GraffitiPaint._internal.getCap();
  document.getElementById('drip-cap-name').textContent = cap;
  const cfg = GraffitiPaint.getDripConfig(cap);
  const disabled = cfg.enabled === false;
  document.getElementById('drip-panel').classList.toggle('disabled-cap', disabled);
  DRIP_KNOBS.forEach(k => {
    const slot = dripInputs[k.key];
    const v = cfg[k.key];
    if (typeof v === 'number') { slot.input.value = v; slot.val.textContent = fmtDrip(v, k.step); }
    else { slot.val.textContent = '—'; }
  });
}
function dripReplay() {
  if (document.body.classList.contains('painting') && state.layout.length) {
    GraffitiPaint.playLayout(state.layout, { fontSize: state.fontSize, speed: getSpeed() });
  }
}
document.getElementById('drips-btn').addEventListener('click', () => {
  const on = document.body.classList.toggle('drips-on');
  document.getElementById('drips-btn').classList.toggle('active', on);
  if (on) refreshDripPanel();
});
document.getElementById('drip-replay').addEventListener('click', () => {
  if (!state.layout.length) { status.textContent = 'Design a tag first.'; return; }
  document.body.classList.add('painting');
  state.selected.clear();
  renderOverlay();
  GraffitiPaint.playLayout(state.layout, { fontSize: state.fontSize, speed: getSpeed() });
});
document.getElementById('drip-reset').addEventListener('click', () => {
  const cap = GraffitiPaint._internal.getCap();
  delete dripStore[cap];
  try { localStorage.setItem(DRIP_STORAGE, JSON.stringify(dripStore)); } catch {}
  status.textContent = `Reset ${cap} drips — reload to restore engine defaults.`;
  // Best-effort live reset to the designer's init defaults for spray; other
  // caps clear their override (full default restored on next reload).
  refreshDripPanel();
});

// ── Animation-path edit mode ────────────────────────────────────────────────
// Two bezier curves (entry + exit) drawn over the stage as SVG, with
// 4 draggable handles for the editable points (entry start, entry control,
// exit control, exit end). The first/last paint anchors are read-only dots
// (their position is computed from the current layout).
// State is persisted to localStorage so Alex's tunings survive reloads.
const PATHS_STORAGE = 'grft-tag-anim-paths';
const animPaths = {
  entry: Object.assign({}, GraffitiPaint.DEFAULT_ENTRY_CONFIG),
  exit:  Object.assign({}, GraffitiPaint.DEFAULT_EXIT_CONFIG),
  writerScale: 1.4,
};
try {
  const raw = localStorage.getItem(PATHS_STORAGE);
  if (raw) {
    const saved = JSON.parse(raw);
    if (saved.entry) Object.assign(animPaths.entry, saved.entry);
    if (saved.exit)  Object.assign(animPaths.exit,  saved.exit);
    if (typeof saved.writerScale === 'number') animPaths.writerScale = saved.writerScale;
  }
} catch {}

function pushAnimToEngine() {
  GraffitiPaint.setEntryConfig(animPaths.entry);
  GraffitiPaint.setExitConfig(animPaths.exit);
  GraffitiPaint.setWriterScale(animPaths.writerScale);
}
function saveAnimPaths() {
  try { localStorage.setItem(PATHS_STORAGE, JSON.stringify(animPaths)); } catch {}
}
pushAnimToEngine();   // apply the loaded values immediately

const pathsSvg = document.getElementById('paths-svg');
const pathsBtn = document.getElementById('paths-btn');
const SVG_NS = 'http://www.w3.org/2000/svg';

function firstPaintPoint() {
  // The engine paints from the first non-space char's baseline anchor.
  for (const c of state.layout) if (c.char !== ' ') return { x: c.x, y: c.y };
  return null;
}
function lastPaintPoint() {
  // Approximation: the last non-space char's baseline anchor + ~half its
  // advance (the engine actually ends at the last stroke point, but for a
  // visual handle this is close enough).
  for (let i = state.layout.length - 1; i >= 0; i--) {
    const c = state.layout[i];
    if (c.char !== ' ') return { x: c.x, y: c.y };
  }
  return null;
}

function renderPaths() {
  if (!document.body.classList.contains('paths-on')) {
    pathsSvg.innerHTML = '';
    return;
  }
  const stage = document.getElementById('stage').getBoundingClientRect();
  const W = stage.width, H = stage.height;
  const firstP = firstPaintPoint();
  const lastP  = lastPaintPoint();
  if (!firstP || !lastP) { pathsSvg.innerHTML = ''; return; }

  pathsSvg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  // Compute pixel positions from the fractional config.
  const e = animPaths.entry;
  const x = animPaths.exit;
  const entryStartPx = { x: e.startXFrac * W, y: e.startYFrac * H };
  const entryCtrlPx  = { x: e.ctrlXFrac  * W, y: firstP.y + e.ctrlYOffsetFrac * H };
  const exitEndPx    = { x: x.endXFrac   * W, y: x.endYFrac    * H };
  const exitCtrlPx   = { x: x.ctrlXFrac  * W, y: lastP.y  + x.ctrlYOffsetFrac * H };

  // For DISPLAY only, clamp handle positions to within the stage edges so
  // the user can always grab them. The underlying fractional values are
  // unchanged — dragging updates them based on cursor position (which can
  // freely go off-stage thanks to pointer capture). A dashed line from the
  // clamped handle to the actual position shows where it "really" is.
  const PAD = 16;
  const clamp = (p) => ({
    x: Math.max(PAD, Math.min(W - PAD, p.x)),
    y: Math.max(PAD, Math.min(H - PAD, p.y)),
    clamped: (p.x < PAD || p.x > W - PAD || p.y < PAD || p.y > H - PAD),
  });
  const esD = clamp(entryStartPx);
  const ecD = clamp(entryCtrlPx);
  const xcD = clamp(exitCtrlPx);
  const eeD = clamp(exitEndPx);

  const colorEntry = '#7cd3ff';
  const colorExit  = '#ff9b6b';

  // Helper for a "ghost trail" line from clamped → actual position.
  const ghost = (from, to, color) => from.clamped
    ? `<line x1="${from.x}" y1="${from.y}" x2="${to.x}" y2="${to.y}" stroke="${color}" stroke-width="1" stroke-dasharray="3 3" opacity="0.45"/>`
    : '';

  pathsSvg.innerHTML = `
    <path d="M ${entryStartPx.x} ${entryStartPx.y} Q ${entryCtrlPx.x} ${entryCtrlPx.y} ${firstP.x} ${firstP.y}"
          fill="none" stroke="${colorEntry}" stroke-width="2" stroke-dasharray="6 4" opacity="0.9"/>
    <line x1="${entryStartPx.x}" y1="${entryStartPx.y}" x2="${entryCtrlPx.x}" y2="${entryCtrlPx.y}"
          stroke="${colorEntry}" stroke-width="1" opacity="0.25"/>
    <line x1="${firstP.x}" y1="${firstP.y}" x2="${entryCtrlPx.x}" y2="${entryCtrlPx.y}"
          stroke="${colorEntry}" stroke-width="1" opacity="0.25"/>

    <path d="M ${lastP.x} ${lastP.y} Q ${exitCtrlPx.x} ${exitCtrlPx.y} ${exitEndPx.x} ${exitEndPx.y}"
          fill="none" stroke="${colorExit}" stroke-width="2" stroke-dasharray="6 4" opacity="0.9"/>
    <line x1="${lastP.x}" y1="${lastP.y}" x2="${exitCtrlPx.x}" y2="${exitCtrlPx.y}"
          stroke="${colorExit}" stroke-width="1" opacity="0.25"/>
    <line x1="${exitEndPx.x}" y1="${exitEndPx.y}" x2="${exitCtrlPx.x}" y2="${exitCtrlPx.y}"
          stroke="${colorExit}" stroke-width="1" opacity="0.25"/>

    ${ghost(esD, entryStartPx, colorEntry)}
    ${ghost(ecD, entryCtrlPx,  colorEntry)}
    ${ghost(xcD, exitCtrlPx,   colorExit)}
    ${ghost(eeD, exitEndPx,    colorExit)}

    <!-- Read-only paint anchors -->
    <circle cx="${firstP.x}" cy="${firstP.y}" r="8" fill="${colorEntry}" opacity="0.7"/>
    <circle cx="${firstP.x}" cy="${firstP.y}" r="3" fill="#000" opacity="0.6"/>
    <circle cx="${lastP.x}"  cy="${lastP.y}"  r="8" fill="${colorExit}"  opacity="0.7"/>
    <circle cx="${lastP.x}"  cy="${lastP.y}"  r="3" fill="#000" opacity="0.6"/>

    <!-- Draggable handles (positioned at CLAMPED display coords) -->
    <circle class="handle" data-h="entryStart" cx="${esD.x}" cy="${esD.y}" r="13"
            fill="${colorEntry}" stroke="#fff" stroke-width="2" opacity="${esD.clamped ? 0.7 : 1}"/>
    <circle class="handle" data-h="entryCtrl"  cx="${ecD.x}" cy="${ecD.y}" r="11"
            fill="${colorEntry}" stroke="#fff" stroke-width="2" opacity="${ecD.clamped ? 0.7 : 0.85}"/>
    <circle class="handle" data-h="exitCtrl"   cx="${xcD.x}" cy="${xcD.y}" r="11"
            fill="${colorExit}"  stroke="#fff" stroke-width="2" opacity="${xcD.clamped ? 0.7 : 0.85}"/>
    <circle class="handle" data-h="exitEnd"    cx="${eeD.x}" cy="${eeD.y}" r="13"
            fill="${colorExit}"  stroke="#fff" stroke-width="2" opacity="${eeD.clamped ? 0.7 : 1}"/>
  `;
}

// Drag the SVG handles. We attach a pointerdown listener on the SVG and
// figure out which handle was clicked.
let pathDrag = null;
pathsSvg.addEventListener('pointerdown', e => {
  if (!e.target.classList || !e.target.classList.contains('handle')) return;
  const handle = e.target.dataset.h;
  const stage = document.getElementById('stage').getBoundingClientRect();
  pathDrag = { handle, stageW: stage.width, stageH: stage.height, stageRect: stage };
  e.target.classList.add('dragging');
  e.target.setPointerCapture(e.pointerId);
  e.stopPropagation();
});
pathsSvg.addEventListener('pointermove', e => {
  if (!pathDrag) return;
  const x = e.clientX - pathDrag.stageRect.left;
  const y = e.clientY - pathDrag.stageRect.top;
  const xFrac = x / pathDrag.stageW;
  const yFrac = y / pathDrag.stageH;
  const firstP = firstPaintPoint();
  const lastP  = lastPaintPoint();
  switch (pathDrag.handle) {
    case 'entryStart':
      animPaths.entry.startXFrac = xFrac;
      animPaths.entry.startYFrac = yFrac;
      break;
    case 'entryCtrl':
      animPaths.entry.ctrlXFrac = xFrac;
      animPaths.entry.ctrlYOffsetFrac = firstP ? (y - firstP.y) / pathDrag.stageH : -0.28;
      break;
    case 'exitCtrl':
      animPaths.exit.ctrlXFrac = xFrac;
      animPaths.exit.ctrlYOffsetFrac = lastP ? (y - lastP.y) / pathDrag.stageH : -0.28;
      break;
    case 'exitEnd':
      animPaths.exit.endXFrac = xFrac;
      animPaths.exit.endYFrac = yFrac;
      break;
  }
  pushAnimToEngine();
  renderPaths();
});
function endPathDrag(e) {
  if (!pathDrag) return;
  document.querySelectorAll('.handle.dragging').forEach(el => el.classList.remove('dragging'));
  pathDrag = null;
  saveAnimPaths();
}
pathsSvg.addEventListener('pointerup',     endPathDrag);
pathsSvg.addEventListener('pointercancel', endPathDrag);

pathsBtn.addEventListener('click', () => {
  document.body.classList.toggle('paths-on');
  pathsBtn.classList.toggle('active', document.body.classList.contains('paths-on'));
  renderPaths();
});

// ── Size slider + Copy / Reset buttons ───────────────────────────────────
const sizeSlider = document.getElementById('size-slider');
const sizeVal    = document.getElementById('size-val');
// Reflect loaded writerScale into slider on boot.
sizeSlider.value = Math.round((animPaths.writerScale || 1) * 100);
sizeVal.textContent = (animPaths.writerScale || 1).toFixed(1) + '×';
sizeSlider.addEventListener('input', () => {
  const v = (+sizeSlider.value) / 100;
  animPaths.writerScale = v;
  sizeVal.textContent = v.toFixed(1) + '×';
  pushAnimToEngine();
  saveAnimPaths();
});

document.getElementById('copy-config').addEventListener('click', async () => {
  const json = JSON.stringify(animPaths, null, 2);
  try {
    await navigator.clipboard.writeText(json);
    status.textContent = '✓ Copied paths + size to clipboard';
  } catch {
    // Fallback: surface it inline for manual copy.
    status.textContent = 'Copy failed — values: ' + json;
    console.log('[grft] animPaths', json);
  }
});

document.getElementById('reset-paths').addEventListener('click', () => {
  if (!confirm('Reset entry/exit paths and can size to engine defaults?')) return;
  Object.assign(animPaths.entry, GraffitiPaint.DEFAULT_ENTRY_CONFIG);
  Object.assign(animPaths.exit,  GraffitiPaint.DEFAULT_EXIT_CONFIG);
  animPaths.writerScale = 1.4;
  sizeSlider.value = 140;
  sizeVal.textContent = '1.4×';
  pushAnimToEngine();
  saveAnimPaths();
  renderPaths();
  status.textContent = 'Animation paths + size reset to defaults';
});
// Re-render paths whenever the layout changes (so the anchors track text edits).
const _origRenderOverlay = renderOverlay;
renderOverlay = function() { _origRenderOverlay(); renderPaths(); };

// ── Boot ─────────────────────────────────────────────────────────────────────
applyDripStore();     // layer any saved drip tunings over init defaults
setCap('spray');      // also refreshes the drip panel from the active cap
refreshSavedDropdown();

GraffitiPaint.loadAssets({
  tracesFull: 'grft-traced-paths.json',
  font:       'Fonts/GraffitiPlusDisplay-Regular.ttf',
  sprayImg:   'images/grft_can.png',
  markerImg:  'images/grft_marker_true_top_down.png',
}).then(() => {
  applyAutoLayout(textInput.value || 'grft+');
}).catch(err => {
  status.textContent = 'Load failed: ' + err.message;
});

// Re-layout on resize (only when no manual arrangement is in progress — we
// don't want to nuke a tag the user just composed). Heuristic: if every char
// is still at its auto-layout default rotation/scale, treat it as fresh.
window.addEventListener('resize', () => {
  if (!state.layout.length) return;
  const allDefault = state.layout.every(c => (!c.rotation && (c.scale || 1) === 1));
  if (allDefault) applyAutoLayout(textInput.value || '');
});
</script>
</body>
</html>
