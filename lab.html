<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GRFT+ · Paint-engine typing test</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Unlisted experiment — keep search engines + social previews away. -->
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<meta property="og:title" content="">
<meta property="og:description" content="">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<script src="opentype.min.js"></script>

<style>
  @font-face {
    font-family: "GraffitiPlus Display";
    src: url("Fonts/GraffitiPlusDisplay-Regular.woff2?v=3") format("woff2");
    font-weight: 400;
    font-style: normal;
    font-display: block;
  }
  :root { --bg: #1a1410; --ink: #fafafa; --accent: #ffc800; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 14px;
    padding: 18px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 700;
    opacity: 0.7;
    margin: 0;
    margin-right: auto;
  }
  input[type=text] {
    background: rgba(255,255,255,0.08);
    color: var(--ink);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 8px 14px;
    font: 700 16px/1 "Inter", system-ui, sans-serif;
    min-width: 200px;
    flex: 1;
    max-width: 480px;
  }
  input[type=text]:focus { outline: 2px solid var(--accent); }
  .pill-group {
    display: inline-flex;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 999px;
    overflow: hidden;
  }
  .pill-group button {
    background: transparent;
    color: var(--ink);
    border: none;
    border-right: 1px solid rgba(255,255,255,0.2);
    padding: 8px 16px;
    cursor: pointer;
    font: 700 12px/1 "Inter", system-ui, sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .pill-group button:last-child { border-right: none; }
  .pill-group button.active {
    background: var(--accent);
    color: var(--bg);
  }
  button.go {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 999px;
    padding: 10px 22px;
    font: 800 13px/1 "Inter", system-ui, sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
  }
  button.go:disabled { opacity: 0.5; cursor: wait; }
  button.go:hover:not(:disabled) { background: #fff; }

  .stage {
    position: relative;
    background-color: #2a1b14;
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='120'><rect width='240' height='120' fill='%23271710'/><g><rect x='3' y='3' width='112' height='52' fill='%239c4a2f'/><rect x='119' y='3' width='118' height='52' fill='%23b35836'/><rect x='-55' y='63' width='112' height='54' fill='%23a64f30'/><rect x='61' y='63' width='112' height='54' fill='%2394462a'/><rect x='177' y='63' width='118' height='54' fill='%23aa5232'/></g><g fill='%23000' fill-opacity='0.18'><rect x='3' y='49' width='112' height='6'/><rect x='119' y='49' width='118' height='6'/><rect x='-55' y='109' width='112' height='8'/><rect x='61' y='109' width='112' height='8'/><rect x='177' y='109' width='118' height='8'/></g><g fill='%23fff' fill-opacity='0.05'><rect x='3' y='3' width='112' height='5'/><rect x='119' y='3' width='118' height='5'/><rect x='-55' y='63' width='112' height='5'/><rect x='61' y='63' width='112' height='5'/><rect x='177' y='63' width='118' height='5'/></g></svg>");
    background-size: 240px 120px;
    background-repeat: repeat;
    border: 1px solid rgba(0,0,0,0.4);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: inset 0 0 180px rgba(0,0,0,0.65);
  }
  #paint {
    display: block;
    width: 100%;
    height: 100%;
  }
  #writer {
    position: absolute;
    pointer-events: none;
    transform-origin: 50% 0;
    transform: translate(-50%, 0);
    will-change: transform, left, top;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,0.6));
    opacity: 0;
    transition: opacity 0.2s;
  }
  footer {
    font-size: 12px;
    opacity: 0.55;
    text-align: center;
  }
  footer code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>

<header>
  <h1>Paint-engine typing test</h1>
  <input id="text" type="text" value="hello" maxlength="40" autocomplete="off" spellcheck="false">
  <div class="pill-group">
    <button id="b-spray" class="active">Spray</button>
    <button id="b-chisel">Chisel</button>
    <button id="b-mop">Mop</button>
  </div>
  <label style="display:inline-flex;align-items:center;gap:8px;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;opacity:0.85;">
    Speed
    <input type="range" id="speed" min="30" max="500" step="10" value="300" style="width:140px;accent-color:var(--accent);">
    <span id="speed-val" style="font:700 12px/1 ui-monospace,Menlo,monospace;width:34px;text-align:right;">3.0×</span>
  </label>
  <button id="clear" class="go" style="background:transparent;color:var(--ink);border:1px solid rgba(255,255,255,0.25);">Clear</button>
  <button id="go" class="go">▶ Play</button>
</header>

<div class="stage" id="stage">
  <canvas id="paint"></canvas>
  <img id="writer" alt="">
</div>

<footer id="status">loading…</footer>

<script src="paint-engine.js"></script>
<script>
// Lab page = paint engine + UI glue. Engine lives in paint-engine.js.
const statusEl = document.getElementById('status');
const speedEl  = document.getElementById('speed');
const speedVal = document.getElementById('speed-val');
const textEl   = document.getElementById('text');

GraffitiPaint.init({
  canvas: document.getElementById('paint'),
  writer: document.getElementById('writer'),
  color:  '#ffc800',
  // Speed reads live from slider; air-travel between strokes is locked at
  // 1/3 of the paint speed — the rhythm Alex confirmed feels natural.
  speed:       () => (+speedEl.value) / 100,
  travelSpeed: () => (+speedEl.value) / 100 / 3,
  // Lab's original tuning: brushes slightly smaller than 404 defaults,
  // reference fontSize 480 (the lab stage is taller than the 404 hero).
  writerConfig: {
    spray:  { brushSize: 50, imgHeight: 220 },
    chisel: { brushSize: 34, imgHeight: 180 },
    mop:    { brushSize: 26, imgHeight: 180 },
  },
  fontSizeRef: 480,
  maxHeightPx: 240,
});

function setCap(name) {
  GraffitiPaint.setCap(name);
  document.getElementById('b-spray').classList.toggle('active',  name === 'spray');
  document.getElementById('b-chisel').classList.toggle('active', name === 'chisel');
  document.getElementById('b-mop').classList.toggle('active', name === 'mop');
}

document.getElementById('b-spray').addEventListener('click',  () => setCap('spray'));
document.getElementById('b-chisel').addEventListener('click', () => setCap('chisel'));
document.getElementById('b-mop').addEventListener('click', () => setCap('mop'));
document.getElementById('go').addEventListener('click', () => {
  GraffitiPaint.play(textEl.value.trim() || 'hello');
});
textEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('go').click();
});
speedEl.addEventListener('input', e => {
  speedVal.textContent = (e.target.value / 100).toFixed(1) + '×';
});
document.getElementById('clear').addEventListener('click', () => GraffitiPaint.clear());

setCap('spray');
GraffitiPaint.loadAssets({
  tracesFull: 'grft-traced-paths.json',
  font:       'Fonts/GraffitiPlusDisplay-Regular.ttf',
  sprayImg:   'images/grft_branded_can.png',
  markerImg:  'images/grft_marker_true_top_down.png',
}).then(() => {
  const letterCount = Object.keys(GraffitiPaint._internal.getTraces()?.letters || {}).length;
  statusEl.textContent = `${letterCount} letters available · type & hit Play`;
  GraffitiPaint.play(textEl.value);
}).catch(err => {
  statusEl.textContent = 'load failed: ' + err.message;
});
</script>

</body>
</html>
